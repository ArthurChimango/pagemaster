    <script>
        (function() {
            function displayError(msg, stack) {
                var errDiv = document.getElementById('debug-error-panel');
                if (!errDiv) {
                    errDiv = document.createElement('div');
                    errDiv.id = 'debug-error-panel';
                    errDiv.style.position = 'fixed';
                    errDiv.style.top = '0';
                    errDiv.style.left = '0';
                    errDiv.style.width = '100%';
                    errDiv.style.height = '100%';
                    errDiv.style.backgroundColor = '#1E1A17';
                    errDiv.style.color = '#FF5E36';
                    errDiv.style.padding = '20px';
                    errDiv.style.zIndex = '999999';
                    errDiv.style.fontFamily = 'monospace';
                    errDiv.style.fontSize = '12px';
                    errDiv.style.overflow = 'auto';
                    errDiv.style.textTransform = 'none';
                    if (document.body) {
                        document.body.appendChild(errDiv);
                    } else {
                        window.addEventListener('DOMContentLoaded', function() {
                            document.body.appendChild(errDiv);
                        });
                    }
                }
                errDiv.innerHTML = '<h1 style="font-size: 20px; margin-bottom: 10px;">DIAGNOSTICO DE ERRO (MAISON L\'ÉCLAT)</h1>' +
                    '<p><b>MENSAGEM:</b> ' + msg + '</p>' +
                    (stack ? '<pre style="margin-top: 15px; border-top: 1px solid #FF5E36; pt-15px;"><b>STACK:</b> ' + stack + '</pre>' : '');
            }

            window.addEventListener('error', function(e) {
                displayError(e.message, e.error ? e.error.stack : 'ARQUIVO: ' + e.filename + ' LINHA: ' + e.lineno);
            });

            var oldConsoleError = console.error;
            console.error = function() {
                var args = Array.prototype.slice.call(arguments);
                oldConsoleError.apply(console, args);
                var msg = args.map(function(arg) {
                    if (arg instanceof Error) return arg.message + '\n' + arg.stack;
                    if (typeof arg === 'object') {
                        try { return JSON.stringify(arg); } catch(e) { return String(arg); }
                    }
                    return String(arg);
                }).join(' ');
                displayError(msg);
            };
        })();
    </script>

            const [dragX, setDragX] = useState(0);
            const [isDragging, setIsDragging] = useState(false);
            const trackRef = useRef(null);
            const startXRef = useRef(0);

            const handleStart = (clientX) => {
                setIsDragging(true);
                startXRef.current = clientX - dragX;
            };

            const handleMove = (clientX) => {
                if (!isDragging || !trackRef.current) return;
                const trackWidth = trackRef.current.offsetWidth;
                const thumbWidth = 48; // W-12 is 48px
                const padding = 12; // left-1.5 and right-1.5 total padding
                const maxDrag = trackWidth - thumbWidth - padding;
                let newX = clientX - startXRef.current;
                if (newX < 0) newX = 0;
                if (newX > maxDrag) newX = maxDrag;
                setDragX(newX);
            };

            const handleEnd = () => {
                if (!isDragging || !trackRef.current) return;
                setIsDragging(false);
                const trackWidth = trackRef.current.offsetWidth;
                const thumbWidth = 48;
                const padding = 12;
                const maxDrag = trackWidth - thumbWidth - padding;
                if (dragX >= maxDrag * 0.85) {
                    setDragX(maxDrag);
                    onSwipeSuccess();
                } else {
                    setDragX(0);
                }
            };

            const onMouseDown = (e) => handleStart(e.clientX);
            const onMouseMove = (e) => handleMove(e.clientX);
            const onMouseUp = () => handleEnd();
            const onMouseLeave = () => { if (isDragging) handleEnd(); };

            const onTouchStart = (e) => handleStart(e.touches[0].clientX);
            const onTouchMove = (e) => handleMove(e.touches[0].clientX);
            const onTouchEnd = () => handleEnd();

            return (
                <div 
                    ref={trackRef}
                    className="w-full max-w-xs h-14 bg-luxuryDark-card/90 rounded-full relative overflow-hidden border border-white/10 mx-auto select-none flex items-center"
                    onMouseMove={onMouseMove}
                    onMouseUp={onMouseUp}
                    onMouseLeave={onMouseLeave}
                    onTouchMove={onTouchMove}
                    onTouchEnd={onTouchEnd}

                        onMouseDown={onMouseDown}

                            left: `${dragX + 6}px`,

        // --- SCREEN 5: SUCCESS ---
        const StepSuccess = ({ formData, onNewBooking }) => {

                    <Confetti />

                    <div className="w-20 h-20 mb-6 bg-orangeAccent/10 text-orangeAccent rounded-full flex items-center justify-center success-icon border-2 border-orangeAccent">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="4.5" className="w-10 h-10">
                            <polyline points="20 6 9 17 4 12" strokeLinecap="round" strokeLinejoin="round" />

                    <h2 className="text-xl font-black text-luxuryDark tracking-wider mb-2 uppercase">AGENDAMENTO CONFIRMADO!</h2>
                    <p className="text-gray-400 text-[9px] mb-8 max-w-xs leading-relaxed font-black tracking-widest uppercase">
                        SEU MOMENTO DE AUTOCUIDADO E BELEZA DE LUXO NA MAISON L'ÉCLAT FOI RESERVADO COM SUCESSO.

        // --- MAIN APP COMPONENT ---
        function App() {
            const [page, setPage] = useState('home'); // 'home' | 'booking'
            const [step, setStep] = useState(1); // 1: Choose Service, 2: Choose Staff, 3: Choose Date/Time, 4: Client Form Modal, 5: Success Screen
            const [loading, setLoading] = useState(false);
            const [initialLoading, setInitialLoading] = useState(true);

            // Firebase variables
            const [services, setServices] = useState([]);
            const [staff, setStaff] = useState([]);
            const [allTimeSlots, setAllTimeSlots] = useState([]);
            const [busySlots, setBusySlots] = useState([]);
            const [webhookUrl, setWebhookUrl] = useState("");
            const [workingDays, setWorkingDays] = useState([0, 1, 2, 3, 4, 5, 6]);

            // Form Data
            const [formData, setFormData] = useState({
                service: null,
                professional: null,
                date: null,
                time: null,
                clientName: '',
                clientPhone: '',
                clientEmail: ''
            });

            const [showContact, setShowContact] = useState(false);
            const [toast, setToast] = useState(null);

            const showToast = (message, type = 'success') => {
                setToast({ message, type });
                setTimeout(() => setToast(null), 4000);
            };

            // Loading Initial Firebase Data
            useEffect(() => {
                const loadData = async () => {
                    try {
                        const servSnapshot = await db.collection('services').get();
                        setServices(servSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));

                        const staffSnapshot = await db.collection('staff').get();
                        setStaff(staffSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));

                        const settingsDoc = await db.collection('settings').doc('geral').get();
                        if (settingsDoc.exists) {
                            setAllTimeSlots(settingsDoc.data().timeSlots || []);
                            setWebhookUrl(settingsDoc.data().webhookUrl || "");
                            if (settingsDoc.data().workingDays !== undefined) {
                                setWorkingDays(settingsDoc.data().workingDays);
                            }
                        }

                        const apptsSnapshot = await db.collection('appointments').get();
                        setBusySlots(apptsSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));

                    } catch (err) {
                        console.error("Erro Firebase:", err);
                    } finally {
                        setInitialLoading(false);
                    }
                };

                if (firebaseConfig.apiKey !== "SUA_API_KEY") {
                    loadData();
                } else {
                    console.warn("Faltam chaves Firebase!");
                    setInitialLoading(false);
                }
            }, []);

            // Submitting Booking to Firestore
            const handleSubmitBooking = async () => {
                setLoading(true);
                try {
                    const newDoc = {
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        clientName: formData.clientName,
                        clientPhone: formData.clientPhone,
                        clientEmail: formData.clientEmail,
                        service: formData.service,
                        professional: typeof formData.professional === 'string' ? formData.professional : formData.professional.name,
                        date: formData.date,
                        time: normalizeTime(formData.time)
                    };

                    const docRef = await db.collection('appointments').add(newDoc);
                    
                    if (webhookUrl) {
                        try {
                            fetch(webhookUrl, {
                                method: "POST",
                                mode: "no-cors",
                                headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    clientName: formData.clientName,
                                    clientPhone: formData.clientPhone,
                                    service: formData.service,
                                    professional: typeof formData.professional === 'string' ? formData.professional : formData.professional.name,
                                    date: formData.date,
                                    time: normalizeTime(formData.time)
                                })
                            });
                        } catch (e) { }
                    }

                    // Add new booking to local busy slots list to prevent double booking in the same session
                    setBusySlots(prev => [...prev, {
                        professional: newDoc.professional,
                        date: newDoc.date,
                        time: newDoc.time
                    }]);

                    setStep(5); // Go to success step
                } catch (err) {
                    showToast("Erro ao realizar agendamento.", "error");
                } finally {
                    setLoading(false);
                }
            };

            const handleNewBooking = () => {
                setFormData({
                    service: null,
                    professional: null,
                    date: null,
                    time: null,
                    clientName: '',
                    clientPhone: '',
                    clientEmail: ''
                });
                setStep(1);
                setPage('booking');
            };

            // Filter staff by selected service role (matches category names)
            const filteredStaff = useMemo(() => {
                if (!formData.service) return staff;
                const category = formData.service.category || formData.service.categoria;
                if (!category) return staff;
                const normalizedCat = String(category).toLowerCase().trim();
                return staff.filter(member => {
                    if (!member.role) return true;
                    const memberRoles = String(member.role).toLowerCase().split(/[\/,]/).map(r => r.trim());
                    return memberRoles.includes(normalizedCat);
                });
            }, [staff, formData.service]);

            const containerBg = page === 'home' ? 'bg-luxuryDark' : 'bg-luxuryLight';

            if (initialLoading) return <SkeletonLoading />;

            return (
                <div className="min-h-screen flex items-center justify-center relative overflow-hidden">
                    {/* Background decorations */}
                    <div className="absolute -top-40 -left-40 w-96 h-96 bg-orangeAccent/10 rounded-full blur-3xl pointer-events-none animate-pulse" style={{ animationDuration: '6s' }} />
                    <div className="absolute -bottom-40 -right-40 w-96 h-96 bg-orangeAccent/5 rounded-full blur-3xl pointer-events-none animate-pulse" style={{ animationDuration: '8s' }} />

                    {/* App Core Container */}
                    <div className={`w-full min-h-screen ${containerBg} flex flex-col relative transition-colors duration-500 overflow-hidden`}>
                        
                        {/* Rendering screens based on page & step states */}
                        <div className="flex-1 relative overflow-hidden h-full flex flex-col justify-between">
                            {page === 'home' && (
                                <HomeLanding onBook={handleNewBooking} />
                            )}

                            {page === 'booking' && (
                                <div className="h-full relative flex-1 flex flex-col justify-between overflow-hidden">
                                    {step === 1 && (
                                        <StepServices 
                                            services={services} 
                                            formData={formData} 
                                            setFormData={setFormData} 
                                            nextStep={() => setStep(2)} 
                                        />
                                    )}
                                    
                                    {step === 2 && (
                                        <StepProfessional 
                                            staff={filteredStaff} 
                                            formData={formData} 
                                            setFormData={setFormData} 
                                            nextStep={() => setStep(3)} 
                                            onBack={() => setStep(1)} 
                                        />
                                    )}

                                    {step === 3 && (
                                        <StepDateTime 
                                            formData={formData} 
                                            setFormData={setFormData} 
                                            onConfirm={() => setStep(4)} 
                                            onBack={() => setStep(2)} 
                                            allTimeSlots={allTimeSlots} 
                                            busySlots={busySlots} 
                                            workingDays={workingDays} 
                                        />
                                    )}

                                    {step === 4 && (
                                        <>
                                            {/* Show step 3 in background behind the slide-up modal */}
                                            <StepDateTime 
                                                formData={formData} 
                                                setFormData={setFormData} 
                                                onConfirm={() => setStep(4)} 
                                                onBack={() => setStep(2)} 
                                                allTimeSlots={allTimeSlots} 
                                                busySlots={busySlots} 
                                                workingDays={workingDays} 
                                            />
                                            <ClientInfoSheet 
                                                isOpen={true} 
                                                onClose={() => setStep(3)} 
                                                formData={formData} 
                                                setFormData={setFormData} 
                                                onSubmit={handleSubmitBooking} 
                                                loading={loading} 
                                            />
                                        </>
                                    )}

                                    {step === 5 && (
                                        <StepSuccess 
                                            formData={formData} 
                                            onNewBooking={handleNewBooking} 
                                        />
                                    )}
                                </div>
                            )}
                        </div>

                        {/* Floating bottom capsule navbar visible on both Landing and Services steps, floating fixed at the bottom */}
                        {(page === 'booking' && step === 1) && (
                            <BottomNavigation 
                                activeTab="services" 
                                onTabSelect={(tab) => {
                                    if (tab === 'home') {
                                        setPage('home');
                                    } else if (tab === 'services') {
                                        handleNewBooking();
                                    } else if (tab === 'contact') {
                                        setShowContact(true);
                                    }
                                }} 
                            />
                        )}

                        {/* Contact Information popup slide-up sheet */}
                        <ContactSheet isOpen={showContact} onClose={() => setShowContact(false)} />

                        {/* Toast Notification popups */}
                        {toast && (
                            <div className="absolute bottom-6 left-1/2 transform -translate-x-1/2 z-[100] animate-slide-up">
                                <div className={`px-5 py-3 rounded-2xl shadow-xl flex items-center gap-2 border text-[10px] font-black uppercase tracking-wider
                                    ${toast.type === 'success' 
                                        ? 'bg-white border-green-500/20 text-emerald-700' 
                                        : 'bg-white border-red-500/20 text-red-650'
                                    }`}
                                >
                                    {toast.type === 'success' ? (
                                        <Icons.CheckCircle className="w-4 h-4 text-emerald-600" />
                                    ) : (
                                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" className="w-4 h-4 text-red-500">
                                            <circle cx="12" cy="12" r="10" />
                                            <line x1="12" y1="8" x2="12" y2="12" />
                                            <line x1="12" y1="16" x2="12.01" y2="16" />
                                        </svg>
                                    )}
                                    {toast.message}
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
