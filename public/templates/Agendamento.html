<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Agendamento - BarberLux</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- FIREBASE COMPAT SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <style>
        /* Fonte Inter: Perfeita para interfaces de apps (limpa e legível) */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --accent: #d4a373;
            --bg-app: #09090b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #000;
            color: #e5e5e5;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
        }

        /* Esconder scrollbars nativas mas manter rolagem */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.3s ease forwards;
        }
    </style>
</head>

<body class="selection:bg-[#d4a373] selection:text-black">

    <div id="root"></div>

    <script type="text/babel">
        // --- CONFIGURAÇÃO FIREBASE ---
        const firebaseConfig = {
            apiKey: "AIzaSyBe7BZFKAFXxqElC_GgI5O-4m8QuBRJ-2Q",
            authDomain: "barbearia-d4d70.firebaseapp.com",
            projectId: "barbearia-d4d70",
            storageBucket: "barbearia-d4d70.firebasestorage.app",
            messagingSenderId: "597532545756",
            appId: "1:597532545756:web:437ff38c1d734dd2cfda19"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        const { useState, useEffect, useMemo, useRef } = React;

        // --- UTILS ---
        const formatCurrency = (val) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
        const formatDateDisplay = (dateString) => {
            if (!dateString) return '';
            const [year, month, day] = dateString.split('-');
            return `${day}/${month}`;
        };
        const normalizeTime = (timeInput) => {
            if (!timeInput) return "";
            const str = String(timeInput);
            const match = str.match(/(\d{1,2}):(\d{2})/);
            if (match) return `${match[1].padStart(2, '0')}:${match[2]}`;
            return str;
        };

        // --- ICONS ---
        const Icons = {
            ChevronLeft: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15 18 9 12 15 6" /></svg>,
            Clock: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10" /><polyline points="12 6 12 12 16 14" /></svg>,
            CheckCircle: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" /><polyline points="22 4 12 14.01 9 11.01" /></svg>,
            Calendar: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2" /><line x1="16" y1="2" x2="16" y2="6" /><line x1="8" y1="2" x2="8" y2="6" /><line x1="3" y1="10" x2="21" y2="10" /></svg>,
            Instagram: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"></line></svg>,
            Phone: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>,
            MapPin: (p) => <svg {...p} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>,
        };

        // --- COMPONENTES DE PERFIL E MAPA ---
        const ShopProfile = () => (
            <div className="mb-10 bg-zinc-900 rounded-3xl overflow-hidden border border-zinc-800 relative shadow-lg">
                {/* Capa do Estabelecimento */}
                <div className="h-32 sm:h-40 w-full bg-zinc-800">
                    <img
                        src="https://images.unsplash.com/photo-1585747860715-2ba37e788b70?auto=format&fit=crop&q=80&w=1000"
                        alt="Capa"
                        className="w-full h-full object-cover"
                    />
                </div>

                {/* Informações */}
                <div className="px-5 pb-6 relative">
                    {/* Logo Circular */}
                    <div className="absolute -top-12 left-5 w-24 h-24 bg-black rounded-full border-4 border-zinc-900 overflow-hidden shadow-xl">
                        <img
                            src="https://images.unsplash.com/photo-1599305090598-fe179d501227?auto=format&fit=crop&q=80&w=200"
                            alt="Logo"
                            className="w-full h-full object-cover"
                        />
                    </div>

                    {/* Botões de Redes Sociais e Contato */}
                    <div className="flex justify-end pt-4 gap-3">
                        <a
                            href="https://instagram.com/"
                            target="_blank"
                            rel="noopener noreferrer"
                            className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-300 hover:text-white hover:bg-[#d4a373] hover:text-black transition-all shadow-sm"
                        >
                            <Icons.Instagram width={20} />
                        </a>
                        <a
                            href="https://wa.me/5500000000000"
                            target="_blank"
                            rel="noopener noreferrer"
                            className="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center text-zinc-300 hover:text-white hover:bg-[#d4a373] hover:text-black transition-all shadow-sm"
                        >
                            <Icons.Phone width={20} />
                        </a>
                    </div>

                    {/* Nome e Endereço */}
                    <div className="mt-2">
                        <h1 className="text-2xl font-bold text-white">BarberLux</h1>
                        <p className="text-sm text-zinc-400 mt-1 flex items-center gap-1.5">
                            <Icons.MapPin width={16} className="text-[#d4a373]" />
                            Rua das Flores, 123 - Centro, Uberlândia - MG
                        </p>
                    </div>
                </div>
            </div>
        );

        const ShopLocation = () => (
            <div className="mt-10 mb-4">
                <h3 className="text-lg font-bold text-white mb-4 px-1">Nossa Localização</h3>
                <a
                    href="https://maps.google.com/?q=Uberlândia,MG"
                    target="_blank"
                    rel="noopener noreferrer"
                    className="block rounded-3xl overflow-hidden border-2 border-zinc-800 hover:border-[#d4a373] transition-all relative group shadow-lg"
                >
                    {/* Overlay Escuro com Botão central */}
                    <div className="absolute inset-0 bg-black/30 group-hover:bg-black/10 transition-colors flex items-center justify-center z-10">
                        <div className="bg-[#09090b]/90 backdrop-blur-md px-5 py-3 rounded-full text-white text-sm font-bold flex items-center gap-2 shadow-xl transform group-hover:scale-105 transition-transform">
                            <Icons.MapPin width={18} className="text-[#d4a373]" /> Abrir no Google Maps
                        </div>
                    </div>
                    {/* Imagem do Mapa (Placeholder) */}
                    <img
                        src="https://images.unsplash.com/photo-1524661135-423995f22d0b?auto=format&fit=crop&q=80&w=800&h=400"
                        alt="Mapa da Barbearia"
                        className="w-full h-48 sm:h-56 object-cover"
                    />
                </a>
            </div>
        );

        // --- CALENDÁRIO HORIZONTAL ---
        const HorizontalDatePicker = ({ selectedDateStr, onDateSelect, workingDays }) => {
            const scrollRef = useRef(null);

            const days = useMemo(() => {
                let list = [];
                let d = new Date();
                d.setHours(0, 0, 0, 0);
                for (let i = 0; i < 45; i++) {
                    let curr = new Date(d);
                    curr.setDate(curr.getDate() + i);
                    if (workingDays && workingDays.includes(curr.getDay())) {
                        list.push(curr);
                    }
                }
                return list;
            }, [workingDays]);

            const weekDaysShort = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];
            const monthsShort = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];

            return (
                <div className="flex items-center gap-3 overflow-x-auto hide-scrollbar pb-2 sm:pb-4 -mx-5 px-5 sm:-mx-10 sm:px-10" ref={scrollRef}>
                    {days.map((dateObj, idx) => {
                        const dateStr = dateObj.toLocaleDateString('en-CA');
                        const isSelected = selectedDateStr === dateStr;
                        const isToday = new Date().toDateString() === dateObj.toDateString();

                        return (
                            <button
                                key={idx}
                                onClick={() => onDateSelect(dateStr)}
                                className={`min-w-[76px] sm:min-w-[86px] flex flex-col items-center justify-center py-4 sm:py-5 rounded-2xl transition-all flex-shrink-0 border-2 
                                    ${isSelected
                                        ? 'bg-[#d4a373] text-black border-[#d4a373]'
                                        : 'bg-zinc-900 border-zinc-800 text-zinc-400 hover:bg-zinc-800'}`}
                            >
                                <span className={`text-xs sm:text-sm font-medium mb-1 ${isSelected ? 'text-black/70' : (isToday ? 'text-[#d4a373]' : 'text-zinc-500')}`}>
                                    {isToday ? 'Hoje' : weekDaysShort[dateObj.getDay()]}
                                </span>
                                <span className={`text-2xl sm:text-3xl font-bold ${isSelected ? 'text-black' : 'text-white'}`}>
                                    {dateObj.getDate()}
                                </span>
                                <span className={`text-[11px] sm:text-xs mt-0.5 sm:mt-1 ${isSelected ? 'text-black/70' : 'text-zinc-500'}`}>
                                    {monthsShort[dateObj.getMonth()]}
                                </span>
                            </button>
                        );
                    })}
                </div>
            );
        };

        // --- COMPONENTES DAS ETAPAS ---

        const StepHeader = ({ step, title }) => (
            <div className="mb-6 sm:mb-8">
                <span className="text-[#d4a373] font-semibold text-sm block mb-1">Passo {step} de 4</span>
                <h2 className="text-2xl sm:text-3xl font-bold text-white">{title}</h2>
            </div>
        );

        const StepServices = ({ services, formData, setFormData, nextStep }) => (
            <div className="animate-slide-up pb-8 px-5 sm:px-10">
                {/* NOVO: Perfil do Estabelecimento no Topo */}
                <ShopProfile />

                <StepHeader step="1" title="O que vamos fazer?" />

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    {services.map(service => (
                        <button
                            key={service.id}
                            onClick={() => { setFormData({ ...formData, service }); setTimeout(nextStep, 150); }}
                            className={`w-full text-left rounded-2xl p-5 border-2 flex items-center justify-between transition-all active:scale-[0.98]
                            ${formData.service?.id === service.id ? 'border-[#d4a373] bg-[#d4a373]/10' : 'border-zinc-800 bg-zinc-900 hover:border-zinc-700'}`}
                        >
                            <div className="flex flex-col">
                                <span className="font-bold text-lg text-white mb-1">{service.name}</span>
                                <span className="text-zinc-400 text-sm flex items-center gap-1.5"><Icons.Clock width={14} /> {service.duration} min</span>
                            </div>
                            <span className="font-bold text-xl text-[#d4a373]">{formatCurrency(service.price)}</span>
                        </button>
                    ))}
                </div>

                {/* NOVO: Mapa do Estabelecimento no Fundo */}
                <ShopLocation />
            </div>
        );

        const StepProfessional = ({ staff, formData, setFormData, nextStep }) => (
            <div className="animate-slide-up pb-8 px-5 sm:px-10">
                <StepHeader step="2" title="Escolha o profissional" />

                <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4">
                    <button
                        onClick={() => { setFormData({ ...formData, professional: 'Qualquer Profissional' }); setTimeout(nextStep, 150); }}
                        className={`rounded-2xl p-5 flex flex-col items-center justify-center text-center transition-all active:scale-[0.98] border-2 h-44 sm:h-48
                        ${formData.professional === 'Qualquer Profissional' ? 'border-[#d4a373] bg-[#d4a373]/10' : 'border-zinc-800 bg-zinc-900 hover:border-zinc-700'}`}
                    >
                        <div className="w-20 h-20 sm:w-24 sm:h-24 rounded-full bg-zinc-800 flex items-center justify-center mb-3">
                            <Icons.Clock width={28} className="text-zinc-400" />
                        </div>
                        <span className="font-bold text-base text-white">Qualquer um</span>
                        <span className="text-xs text-zinc-400 mt-1">Primeiro livre</span>
                    </button>

                    {staff.map(member => (
                        <button
                            key={member.id}
                            onClick={() => { setFormData({ ...formData, professional: member }); setTimeout(nextStep, 150); }}
                            className={`rounded-2xl p-5 flex flex-col items-center justify-center text-center transition-all active:scale-[0.98] border-2 h-44 sm:h-48
                            ${formData.professional?.id === member.id ? 'border-[#d4a373] bg-[#d4a373]/10' : 'border-zinc-800 bg-zinc-900 hover:border-zinc-700'}`}
                        >
                            <img src={member.image || 'https://images.unsplash.com/photo-1583332130317-de122d11a7e6?auto=format&fit=crop&q=80&w=200'}
                                className="w-20 h-20 sm:w-24 sm:h-24 rounded-full object-cover mb-3" alt={member.name} />
                            <span className="font-bold text-base text-white w-full truncate">{member.name}</span>
                            <span className="text-xs text-zinc-400 mt-1 truncate w-full">{member.role}</span>
                        </button>
                    ))}
                </div>
            </div>
        );

        const StepDateTime = ({ formData, setFormData, nextStep, allTimeSlots, busySlots, workingDays }) => {
            const availableSlots = useMemo(() => {
                let rawSlots = allTimeSlots || [];
                if (formData.professional && typeof formData.professional === 'object') {
                    const profHours = formData.professional.availableHours;
                    if (Array.isArray(profHours) && profHours.length > 0 && profHours[0].trim() !== "") {
                        rawSlots = profHours;
                    }
                }
                let baseSlots = rawSlots.map(normalizeTime);
                return baseSlots.filter(slotTime => !busySlots.some(busy => busy.date === formData.date && normalizeTime(busy.time) === slotTime && (typeof formData.professional === 'string' ? busy.professional === formData.professional : busy.professional === formData.professional.name)));
            }, [formData.date, formData.professional, allTimeSlots, busySlots]);

            return (
                <div className="animate-slide-up pb-8 px-0 sm:px-0">
                    <div className="px-5 sm:px-10">
                        <StepHeader step="3" title="Data e horário" />
                    </div>

                    <HorizontalDatePicker selectedDateStr={formData.date} onDateSelect={(date) => setFormData({ ...formData, date, time: null })} workingDays={workingDays} />

                    <div className="px-5 sm:px-10 mt-8">
                        {!formData.date ? (
                            <div className="p-6 rounded-2xl bg-zinc-900 border border-zinc-800 border-dashed text-zinc-500 text-center">
                                Toque em um dia acima para ver os horários.
                            </div>
                        ) : availableSlots.length > 0 ? (
                            <div className="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3 sm:gap-4">
                                {availableSlots.map((time, idx) => (
                                    <button
                                        key={idx}
                                        onClick={() => { setFormData({ ...formData, time }); setTimeout(nextStep, 150); }}
                                        className={`py-4 rounded-2xl text-base font-bold border-2 transition-all active:scale-95
                                        ${formData.time === time
                                                ? 'bg-[#d4a373] text-black border-[#d4a373]'
                                                : 'bg-zinc-900 text-zinc-300 border-zinc-800 hover:border-zinc-700'}`}
                                    >
                                        {time}
                                    </button>
                                ))}
                            </div>
                        ) : (
                            <div className="p-5 bg-zinc-900 border border-zinc-800 rounded-2xl text-zinc-400 text-center">
                                Sem horários livres neste dia.
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const StepClientInfo = ({ formData, setFormData, handleSubmit, loading }) => (
            <div className="animate-slide-up pb-8 px-5 sm:px-10 flex flex-col h-full max-w-2xl mx-auto">
                <StepHeader step="4" title="Seus dados" />

                <div className="bg-zinc-900 p-5 rounded-2xl mb-8 flex items-center justify-between">
                    <div>
                        <p className="font-bold text-white mb-1">{formData.service?.name}</p>
                        <p className="text-sm text-zinc-400">{formatDateDisplay(formData.date)} às {formData.time}</p>
                    </div>
                    <span className="font-bold text-[#d4a373] text-lg">{formatCurrency(formData.service?.price)}</span>
                </div>

                <div className="space-y-5 flex-1">
                    <div>
                        <label className="text-sm font-medium text-zinc-400 mb-2 block">Como podemos chamar você?</label>
                        <input type="text" className="w-full bg-zinc-900 border-2 border-zinc-800 rounded-2xl p-4 text-white text-base outline-none focus:border-[#d4a373] transition-colors"
                            placeholder="Seu nome completo" value={formData.clientName} onChange={(e) => setFormData({ ...formData, clientName: e.target.value })} />
                    </div>

                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-5">
                        <div>
                            <label className="text-sm font-medium text-zinc-400 mb-2 block">Seu WhatsApp</label>
                            <input type="tel" className="w-full bg-zinc-900 border-2 border-zinc-800 rounded-2xl p-4 text-white text-base outline-none focus:border-[#d4a373] transition-colors"
                                placeholder="(00) 00000-0000" value={formData.clientPhone} onChange={(e) => setFormData({ ...formData, clientPhone: e.target.value })} />
                        </div>
                        <div>
                            <label className="text-sm font-medium text-zinc-400 mb-2 block">E-mail (Opcional)</label>
                            <input type="email" className="w-full bg-zinc-900 border-2 border-zinc-800 rounded-2xl p-4 text-white text-base outline-none focus:border-[#d4a373] transition-colors"
                                placeholder="seu@email.com" value={formData.clientEmail} onChange={(e) => setFormData({ ...formData, clientEmail: e.target.value })} />
                        </div>
                    </div>
                </div>

                <div className="mt-10 sm:mt-12">
                    <button onClick={handleSubmit} disabled={!formData.clientName || !formData.clientPhone || loading}
                        className="w-full bg-[#d4a373] text-black font-bold text-lg py-5 rounded-2xl transition-all disabled:opacity-50 disabled:cursor-not-allowed hover:bg-[#c29260] active:scale-[0.98] flex justify-center items-center h-16 shadow-[0_8px_20px_rgba(212,163,115,0.2)]">
                        {loading ? <div className="w-6 h-6 border-4 border-black/20 border-t-black rounded-full animate-spin"></div> : 'Confirmar Agendamento'}
                    </button>
                </div>
            </div>
        );

        const StepSuccess = () => {
            return (
                <div className="text-center px-5 sm:px-10 py-16 animate-fade-in flex flex-col items-center justify-center h-full">
                    <div className="w-20 h-20 sm:w-28 sm:h-28 bg-[#d4a373]/10 rounded-full flex items-center justify-center mb-6">
                        <Icons.CheckCircle width={48} className="text-[#d4a373]" />
                    </div>
                    <h2 className="text-2xl sm:text-4xl font-bold text-white mb-3">Agendamento concluído!</h2>
                    <p className="text-zinc-400 mb-10 text-base sm:text-lg max-w-md mx-auto">O seu lugar já está reservado na barbearia. Te esperamos no horário marcado!</p>

                    <button onClick={() => window.location.reload()} className="w-full max-w-md bg-zinc-900 border-2 border-zinc-800 hover:bg-zinc-800 text-white font-semibold py-4 rounded-xl transition-all active:scale-[0.98]">
                        Fazer outro agendamento
                    </button>
                </div>
            );
        };

        // --- MAIN APP COMPONENT ---

        function App() {
            const [step, setStep] = useState(1);
            const [loading, setLoading] = useState(false);
            const [initialLoading, setInitialLoading] = useState(true);

            const [services, setServices] = useState([]);
            const [staff, setStaff] = useState([]);
            const [allTimeSlots, setAllTimeSlots] = useState([]);
            const [busySlots, setBusySlots] = useState([]);
            const [webhookUrl, setWebhookUrl] = useState("");
            const [workingDays, setWorkingDays] = useState([0, 1, 2, 3, 4, 5, 6]);

            const [formData, setFormData] = useState({ service: null, professional: null, date: null, time: null, clientName: '', clientPhone: '', clientEmail: '' });

            useEffect(() => {
                const loadData = async () => {
                    try {
                        const servSnapshot = await db.collection('services').get();
                        setServices(servSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));

                        const staffSnapshot = await db.collection('staff').get();
                        setStaff(staffSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));

                        const settingsDoc = await db.collection('settings').doc('geral').get();
                        if (settingsDoc.exists) {
                            setAllTimeSlots(settingsDoc.data().timeSlots || []);
                            setWebhookUrl(settingsDoc.data().webhookUrl || "");
                            if (settingsDoc.data().workingDays !== undefined) {
                                setWorkingDays(settingsDoc.data().workingDays);
                            }
                        }

                        const apptsSnapshot = await db.collection('appointments').get();
                        setBusySlots(apptsSnapshot.docs.map(doc => {
                            const data = doc.data();
                            return { professional: data.professional, date: data.date, time: data.time };
                        }));
                    } catch (err) {
                        console.error("Erro Firebase:", err);
                    } finally {
                        setInitialLoading(false);
                    }
                };

                if (firebaseConfig.apiKey !== "SUA_API_KEY") loadData();
                else { console.warn("Faltam chaves Firebase!"); setInitialLoading(false); }
            }, []);

            const handleSubmit = async () => {
                setLoading(true);
                try {
                    await db.collection('appointments').add({
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        clientName: formData.clientName,
                        clientPhone: formData.clientPhone,
                        clientEmail: formData.clientEmail,
                        service: formData.service,
                        professional: typeof formData.professional === 'string' ? formData.professional : formData.professional.name,
                        date: formData.date,
                        time: normalizeTime(formData.time)
                    });

                    if (webhookUrl) {
                        try {
                            fetch(webhookUrl, {
                                method: "POST", mode: "no-cors", headers: { "Content-Type": "application/json" },
                                body: JSON.stringify({
                                    clientName: formData.clientName, clientPhone: formData.clientPhone,
                                    service: formData.service, professional: typeof formData.professional === 'string' ? formData.professional : formData.professional.name,
                                    date: formData.date, time: normalizeTime(formData.time)
                                })
                            });
                        } catch (e) { }
                    }
                    setStep(5);
                } catch (err) { alert("Erro ao agendar."); }
                finally { setLoading(false); }
            };

            const filteredStaff = useMemo(() => {
                if (!formData.service) return staff;
                const category = formData.service.category || formData.service.categoria;
                if (!category) return staff;
                const normalizedCat = String(category).toLowerCase().trim();
                return staff.filter(member => {
                    if (!member.role) return true;
                    const memberRoles = String(member.role).toLowerCase().split(/[\/,]/).map(r => r.trim());
                    return memberRoles.includes(normalizedCat);
                });
            }, [staff, formData.service]);


            if (initialLoading) return (
                <div className="h-[100dvh] w-full bg-[#09090b] flex items-center justify-center">
                    <div className="w-10 h-10 border-4 border-[#d4a373]/20 border-t-[#d4a373] rounded-full animate-spin"></div>
                </div>
            );

            return (
                <div className="bg-[#000] sm:bg-zinc-950 min-h-screen flex items-center justify-center sm:p-6 lg:p-10">
                    <div className="w-full sm:max-w-2xl lg:max-w-3xl bg-[#09090b] flex flex-col relative sm:shadow-2xl overflow-hidden sm:rounded-3xl border-0 sm:border border-zinc-800/80 h-[100dvh] sm:h-[85vh] sm:max-h-[850px]">

                        <header className="sticky top-0 z-50 bg-[#09090b]/95 backdrop-blur-md px-3 sm:px-6 h-16 flex items-center shrink-0 border-b border-zinc-900">
                            {step > 1 && step < 5 && (
                                <button onClick={() => setStep(s => s - 1)} className="p-2 text-zinc-400 hover:text-white active:scale-95 transition-all flex items-center gap-1">
                                    <Icons.ChevronLeft width={26} /> <span className="font-medium text-sm hidden sm:block">Voltar</span>
                                </button>
                            )}
                            <div className="ml-auto font-bold text-white text-lg tracking-tight pr-4">
                                Barber<span className="text-[#d4a373]">Lux</span>
                            </div>
                        </header>

                        <main className="flex-1 overflow-y-auto hide-scrollbar pt-6 sm:pt-8">
                            {step === 1 && <StepServices services={services} formData={formData} setFormData={setFormData} nextStep={() => setStep(2)} />}
                            {step === 2 && <StepProfessional staff={filteredStaff} formData={formData} setFormData={setFormData} nextStep={() => setStep(3)} />}
                            {step === 3 && <StepDateTime formData={formData} setFormData={setFormData} nextStep={() => setStep(4)} allTimeSlots={allTimeSlots} busySlots={busySlots} workingDays={workingDays} />}
                            {step === 4 && <StepClientInfo formData={formData} setFormData={setFormData} handleSubmit={handleSubmit} loading={loading} />}
                            {step === 5 && <StepSuccess />}
                        </main>

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
